<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Identificação de Porta - UniBB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- TELA DO FORMULÁRIO -->
    <div id="setup-form" class="form-container">
        <h2 class="form-title">Gerar Identificação de Porta</h2>
        <form id="form-card">
            <div class="form-group">
                <label for="in-curso">Nome do Curso *</label>
                <input type="text" id="in-curso" placeholder="Ex: Oficina DE&I Aprendizagem" required>
            </div>

            <div class="form-group">
                <label for="in-genero">Gênero dos Educadores/as</label>
                <select id="in-genero">
                    <option value="neutro" selected>Neutro</option>
                    <option value="feminino">Feminino</option>
                    <option value="masculino">Masculino</option>
                </select>
            </div>

            <div class="form-group">
                <label for="in-ed1">Primeiro Educador/a *</label>
                <input type="text" id="in-ed1" required>
            </div>
            <div class="form-group">
                <label for="in-ed2">Segundo Educador/a (Opcional)</label>
                <input type="text" id="in-ed2">
            </div>
            <div class="form-group">
                <label for="in-data">Data do evento*</label>
                <input type="text" id="in-data" placeholder="Ex: 10 a 12/03/2026" required>
            </div>
            <div class="form-group">
                <label for="in-horario">Horário *</label>
                <textarea id="in-horario" placeholder="Ex: 09h às 18h" rows="2" required></textarea>
            </div>
            <button type="submit" class="btn-primary">Gerar Identificação</button>
        </form>
    </div>

    <!-- TELA DO RESULTADO -->
    <div id="card-resultado" style="display: none;">
        <div id="capture-area" class="card">
            <div class="content-card">
                <h1><strong>Boas vindas!</strong></h1>
                <div class="info-item"><strong>Curso:</strong> <span id="out-curso"></span></div>
                <div class="info-item"><strong id="label-educadores">Educadores/as:</strong> <span id="out-ed1"></span></div>
                <div id="container-ed2"></div>
                <div class="info-item"><strong>Data:</strong> <span id="out-data"></span></div>
                <div class="info-item"><strong>Horário:</strong> <span id="out-horario"></span></div>
                <h2 class="msg-final">Bom curso!</h2>
                <img src="../Footer.jpg" alt="Icones UniBB">
            </div>
        </div>

        <div class="botoes-acao">
            <button type="button" class="btn-voltar" onclick="voltar()">Alterar</button>
            <button type="button" class="btn-download" onclick="baixarImagem()">Baixar Imagem (JPG)</button>
            <button type="button" class="btn-download" onclick="baixarPDF()">Baixar PDF</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
<a href="../index.html" class="btn-voltar2">

</a>
</html>
